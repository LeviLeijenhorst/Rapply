# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - coachscribe-api

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/main_coachscribe-api.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and prepare server
        run: |
          npm ci
          npm run build
          npm prune --omit=dev
          zip -r ../api-deploy.zip dist package.json package-lock.json node_modules
        working-directory: server

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: api-deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_026CAF20A63C401BAFE74DEFEFDC9705 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8C9D5538B80C4FB3A20A76B81042D3A0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BB51D545A8B64B09AB5C83887B1655AD }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'coachscribe-api'
          slot-name: 'Production'
          package: './api-deploy.zip'
          startup-command: 'node dist/index.cjs'
          
