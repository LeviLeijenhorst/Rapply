name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "webapp/**"
      - ".github/workflows/azure-static-web-apps-red-pond-09ece7303.yml"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main
    paths:
      - "webapp/**"
      - ".github/workflows/azure-static-web-apps-red-pond-09ece7303.yml"

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    env:
      NODE_VERSION: "20"
      EXPO_PUBLIC_FUNCTIONS_BASE_URL: ${{ vars.EXPO_PUBLIC_FUNCTIONS_BASE_URL }}
      EXPO_PUBLIC_ENTRA_OPENID_CONFIGURATION_URL: ${{ vars.EXPO_PUBLIC_ENTRA_OPENID_CONFIGURATION_URL }}
      EXPO_PUBLIC_ENTRA_CLIENT_ID: ${{ vars.EXPO_PUBLIC_ENTRA_CLIENT_ID }}
      EXPO_PUBLIC_ENTRA_API_SCOPE: ${{ vars.EXPO_PUBLIC_ENTRA_API_SCOPE }}
      EXPO_PUBLIC_ENTRA_ACCOUNT_PORTAL_URL: ${{ vars.EXPO_PUBLIC_ENTRA_ACCOUNT_PORTAL_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_POND_09ECE7303 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "webapp"
          api_location: ""
          output_location: "dist"
          app_build_command: "npx expo export -p web"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_POND_09ECE7303 }}
          action: "close"
