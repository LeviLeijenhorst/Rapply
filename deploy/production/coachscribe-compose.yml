services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - coachscribe_server

  coachscribe_server:
    build:
      context: ../..
      dockerfile: deploy/production/server.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      PORT: "8787"
      NODE_ENV: "production"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      REVENUECAT_SECRET_KEY: "${REVENUECAT_SECRET_KEY}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      MISTRAL_CHAT_MODEL: "${MISTRAL_CHAT_MODEL}"
      MISTRAL_SUMMARY_MODEL: "${MISTRAL_SUMMARY_MODEL}"
      MISTRAL_TRANSCRIPTION_MODEL: "${MISTRAL_TRANSCRIPTION_MODEL}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS}"
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS}"

volumes:
  caddy_data:
  caddy_config:

